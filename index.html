<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#003d1f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>P84/85 Hull — Localização de equipamentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page-bg" aria-hidden="true">
    <div class="page-bg-layer page-bg-layer--1" data-parallax="0.15"></div>
    <div class="page-bg-layer page-bg-layer--2" data-parallax="0.08"></div>
    <div class="page-bg-grain"></div>
  </div>

  <header class="hero" id="hero">
    <div class="hero-inner">
      <p class="hero-eyebrow">LocTag · Piloto</p>
      <h1 class="hero-title">P84/85 Hull</h1>
      <p class="hero-lead">Localização de tags de equipamento</p>
      <div class="hero-accent" aria-hidden="true"></div>
    </div>
  </header>

  <main class="main">
    <section class="search-bar">
      <label for="search-input" class="visually-hidden">Buscar equipamento</label>
      <div class="search-field">
        <span class="search-icon" aria-hidden="true"></span>
        <input
          type="search"
          id="search-input"
          placeholder="Buscar tag ou sistema..."
          autocomplete="off"
          enterkeyhint="search"
        >
      </div>
      <button type="button" id="clear-btn" class="btn-secondary">Limpar</button>
    </section>

    <article id="selection-detail" class="selection-detail hidden" aria-live="polite">
      <div class="selection-detail-inner">
        <span class="selection-tag" id="detail-tag"></span>
        <span class="selection-desc" id="detail-desc"></span>
        <dl class="selection-meta">
          <div><dt>Sistema</dt><dd id="detail-sistema"></dd></div>
          <div><dt>Deck</dt><dd id="detail-deck"></dd></div>
          <div><dt>Área</dt><dd id="detail-area"></dd></div>
        </dl>
      </div>
    </article>

    <nav class="main-tabs" role="tablist" aria-label="Seções principais">
      <button type="button" role="tab" id="tab-lista" class="main-tab is-active" aria-selected="true" aria-controls="panel-lista" data-panel="lista">
        Lista
        <span id="result-count" class="tab-badge"></span>
      </button>
      <button type="button" role="tab" id="tab-mapa" class="main-tab" aria-selected="false" aria-controls="panel-mapa" data-panel="mapa">
        Mapa
      </button>
    </nav>

    <div class="content-grid">
      <section id="panel-lista" class="table-panel panel-tab is-active" role="tabpanel" aria-labelledby="tab-lista">
        <h2 class="panel-title panel-title-desktop"><span class="panel-num">01</span> Equipamentos</h2>
        <div id="tags-cards" class="tags-cards" aria-label="Lista de equipamentos"></div>
        <div class="table-wrap table-wrap-desktop">
          <table id="tags-table">
            <thead>
              <tr>
                <th>Tag</th>
                <th>Descrição</th>
                <th>Sistema</th>
                <th>Deck</th>
                <th>Área</th>
              </tr>
            </thead>
            <tbody id="tags-tbody"></tbody>
          </table>
          <p id="empty-state" class="empty-state hidden">Nenhuma tag encontrada.</p>
        </div>
      </section>

      <section id="panel-mapa" class="views-panel panel-tab" role="tabpanel" aria-labelledby="tab-mapa" hidden>
        <nav class="view-tabs" role="tablist" aria-label="Tipo de vista">
          <button type="button" role="tab" id="view-tab-planta" class="view-tab is-active" aria-selected="true" data-view="planta">Planta</button>
          <button type="button" role="tab" id="view-tab-lateral" class="view-tab" aria-selected="false" data-view="lateral">Lateral</button>
        </nav>

        <div class="view-block view-pane is-active" data-view-pane="planta">
          <h2 class="panel-title panel-title-desktop"><span class="panel-num">02</span> Vista em planta</h2>
          <div class="svg-wrap">
            <svg id="svg-planta" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" aria-label="Vista em planta">
              <image href="assets/planta.svg" x="0" y="0" width="1000" height="500" preserveAspectRatio="xMidYMid meet"/>
              <g id="markers-planta" class="markers-layer"></g>
            </svg>
          </div>
        </div>
        <div class="view-block view-pane" data-view-pane="lateral" hidden>
          <h2 class="panel-title panel-title-desktop"><span class="panel-num">03</span> Vista lateral</h2>
          <div class="svg-wrap">
            <svg id="svg-lateral" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" aria-label="Vista lateral">
              <image href="assets/lateral.svg" x="0" y="0" width="1000" height="500" preserveAspectRatio="xMidYMid meet"/>
              <g id="markers-lateral" class="markers-layer"></g>
            </svg>
          </div>
        </div>
        <p class="map-hint">Selecione um equipamento na lista para localizar no mapa.</p>
      </section>
    </div>
  </main>

  <footer class="footer">
    <p>P84/85 Hull · Dados de demonstração</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
